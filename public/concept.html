<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarniLab - Cultivar Concept</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .preview-container {
            text-align: center;
        }

        .mobile-frame {
            width: 375px;
            /* height: 812px; height matches image aspect ratio mostly, usually auto is safer for image */
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 8px solid #000;
            position: relative;
        }

        .mobile-frame img {
            width: 100%;
            display: block;
        }

        h1 {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
            font-weight: normal;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="preview-container">
        <h1>DESIGN CONCEPT PREVIEW</h1>
        <div class="mobile-frame">
            <img src="/cultivar_concept.png" alt="Cultivar Certificate Design">
        </div>
    </div>
</body>

</html>
